server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router — renvoyer index.html pour toutes les routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers l'API CRUD
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy vers l'Agent IA — SSE streaming (uniquement l'endpoint stream)
    location /chat/stream {
        proxy_pass http://agent:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Désactive le buffering pour le streaming SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
